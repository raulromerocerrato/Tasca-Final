<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <title>Llista d'activitats</title>
</head>
<body>
    <aside class="sidebar">
        </b><div class="sidebar-titol"><b>Menú</b></div>
        <nav>
            <a href="index.html"><b>Llistat d'activitats</b></a>
            <a href="crear-tasca.html"><b>Crear Tasca</b></a>
            <a href="categories.html"><b>Gestió de Categories</b></a>
        </nav>
    </aside>
    <main>
        <h1>Crear Tasca</h1>
        <div class="formulari-tasca">
            <form action="index.html" method="post">
                <label for="titol">Títol de la tasca:</label>
                <input type="text" id="titol" name="titol" required>
                <label for="descripcio">Descripció:</label>
                <textarea id="descripcio" name="descripcio" required></textarea>
                <label for="data">Data:</label>
                <input type="date" id="data" name="data" required>
                <label for="categoria">Categoria:</label>
                <select id="categoria" name="categoria" required>
                    <option value="">Selecciona una categoria</option>
                    <option value="treball">Treball</option>
                    <option value="personal">Personal</option>
                    <option value="estudis">Estudis</option>
                </select>
                <label for="prioritat">Prioritat:</label>
                <select id="prioritat" name="prioritat" required>   
                    <option value="">Selecciona una prioritat</option>
                    <option value="alta">Alta</option>
                    <option value="mitjana">Mitjana</option>
                    <option value="baixa">Baixa</option>
                </select>
                <button type="submit" class="btn-blau">Crear Tasca</button>
            </form>
        </div>
    </main>
    <script type="module" src="js/categories.js"></script>
    <script type="module" src="js/grafics.js"></script>
    <script type="module" src="js/index.js"></script>
    <script type="module" src="js/models.js"></script>
    <script type="module" src="js/form-tasca.js"></script>
    <script type="module" src="js/storage.js"></script>
</body>
</html>
